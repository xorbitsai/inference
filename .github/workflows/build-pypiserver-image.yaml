name: Build custom pypiserver image

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-release-permission:
    name: Check release tag permission
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/check-release-permission

  # ------------------------------------------------------------------
  # Build Docker image per architecture on native runners.
  # Each runner uses list-packages.sh to generate the package list,
  # then pip download collects all wheels inside the container.
  # ------------------------------------------------------------------
  build-and-push-image:
    name: Build and push ${{ matrix.arch }} image
    needs: check-release-permission
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Determine image tag
        shell: bash
        run: |
          if [[ "$GITHUB_REF" =~ ^"refs/tags/" ]]; then
            IMAGE_TAG="${GITHUB_REF#refs/tags/}"
            echo "Will handle tag $IMAGE_TAG"
          else
            BRANCH="${GITHUB_REF_NAME:-$(git rev-parse --abbrev-ref HEAD)}"
            git checkout "$BRANCH"
            IMAGE_TAG="$BRANCH"
          fi
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Debug
        run: |
          echo "Running on runner: $(uname -m)"
          echo "IMAGE_TAG=${{ env.IMAGE_TAG }}"
          docker buildx version
          docker info

      - name: Build and push ${{ matrix.arch }} image
        if: ${{ github.repository == 'xorbitsai/inference' }}
        uses: docker/build-push-action@v7
        env:
          DOCKER_ORG: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          context: .
          file: xinference/deploy/docker/pypiserver/Dockerfile.pypiserver
          platforms: linux/${{ matrix.arch }}
          build-args: |
            PLATFORM=${{ matrix.arch }}
          push: true
          provenance: false
          tags: |
            ${{ env.DOCKER_ORG }}/pypiserver:${{ env.IMAGE_TAG }}-${{ matrix.arch }}
            ${{ env.DOCKER_ORG }}/pypiserver:latest-${{ matrix.arch }}

  # ------------------------------------------------------------------
  # Merge architecture-specific images into a multi-arch manifest list.
  # Users pull :latest or :<tag> and get the correct arch automatically.
  # ------------------------------------------------------------------
  merge-manifest:
    name: Merge multi-arch manifest
    needs: build-and-push-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Determine image tag
        shell: bash
        run: |
          if [[ "$GITHUB_REF" =~ ^"refs/tags/" ]]; then
            IMAGE_TAG="${GITHUB_REF#refs/tags/}"
            echo "Will handle tag $IMAGE_TAG"
          else
            BRANCH="${GITHUB_REF_NAME:-$(git rev-parse --abbrev-ref HEAD)}"
            git checkout "$BRANCH"
            IMAGE_TAG="$BRANCH"
          fi
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Create and push multi-arch manifest (:latest)
        if: ${{ github.repository == 'xorbitsai/inference' }}
        env:
          DOCKER_ORG: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          docker buildx imagetools create \
            --tag $DOCKER_ORG/pypiserver:latest \
            $DOCKER_ORG/pypiserver:latest-amd64 \
            $DOCKER_ORG/pypiserver:latest-arm64

      - name: Create and push multi-arch manifest (:tag)
        if: ${{ github.repository == 'xorbitsai/inference' }}
        env:
          DOCKER_ORG: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          docker buildx imagetools create \
            --tag $DOCKER_ORG/pypiserver:$IMAGE_TAG \
            $DOCKER_ORG/pypiserver:$IMAGE_TAG-amd64 \
            $DOCKER_ORG/pypiserver:$IMAGE_TAG-arm64
