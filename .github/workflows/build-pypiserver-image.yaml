name: Build custom pypiserver image

on:
  workflow_dispatch:
  push:
    branches:
      - feat/build-pypiserver-image

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # Build Docker image per architecture on native runners.
  # Each runner builds the xinference wheel locally, then builds the
  # Docker image on the native host arch — no QEMU emulation needed.
  # ------------------------------------------------------------------
  build-and-push-image:
    name: Build and push ${{ matrix.arch }} image
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: qinruicool/pypiserver-dev

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          # Aggressive cleanup — this workflow is disk-bound (hundreds of wheels + Docker layers).
          # Each pip download phase pulls ~10-20 GiB of packages; maximize available space.
          android: true           # ~12 GiB
          dotnet: true            # ~1.7 GiB
          haskell: true           # negligible but harmless
          docker-images: true     # ~3.6 GiB (pre-cached images not needed for this build)
          large-packages: true    # ~4.6 GiB (apt-get remove bulky pre-installed packages)
          swap-storage: true      # ~4.0 GiB (swap file — memory-light build, disk-heavy)
          tool-cache: true        # ~8.4 GiB (setup-python re-downloads what it needs)
          
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build "setuptools<82"

      - name: Checking tool version
        run: |
          echo "### Checking... ###"
          python --version
          pip --version
          hostnamectl
          uname -m
          df -h

      - name: Debug with specific py packages
        run: |
          echo "### Debugging... ###"
          # python3 -m pip install eva-decord

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push ${{ matrix.arch }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: xinference/deploy/docker/Dockerfile.pypi
          platforms: linux/${{ matrix.arch }}
          build-args: |
            TARGET_ARCH=${{ matrix.arch }}
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}-${{ matrix.arch }}
            ${{ env.IMAGE_NAME }}:latest-${{ matrix.arch }}

  # ------------------------------------------------------------------
  # Merge architecture-specific images into a multi-arch manifest list.
  # Users pull :latest or :<sha> and get the correct arch automatically.
  # ------------------------------------------------------------------
  merge-manifest:
    name: Merge multi-arch manifest
    needs: build-and-push-image
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      IMAGE_NAME: qinruicool/pypiserver-dev

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Create and push multi-arch manifest (:latest)
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME }}:latest \
            ${{ env.IMAGE_NAME }}:latest-amd64 \
            ${{ env.IMAGE_NAME }}:latest-arm64

      - name: Create and push multi-arch manifest (:sha)
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}-amd64 \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}-arm64
