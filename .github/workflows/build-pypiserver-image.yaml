name: Build xinference-pypiserver image

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-release-permission:
    name: Check release tag permission
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/check-release-permission

  # ------------------------------------------------------------------
  # Build the image per architecture on native runners. The Dockerfile
  # downloads every wheel, then a selfcheck stage proves the mirror is
  # self-sufficient offline — the build fails otherwise.
  # On workflow_dispatch the image is built and gated but NOT pushed.
  # ------------------------------------------------------------------
  build-and-push-image:
    name: Build and push ${{ matrix.arch }} image
    needs: check-release-permission
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Free disk space
        shell: bash
        # The mirror holds ~10 GiB of wheels and the build keeps two
        # copies across stages; the default runner disk is not enough.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
            /opt/ghc /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker system prune -af
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: ${{ startsWith(github.ref, 'refs/tags/') && github.repository == 'xorbitsai/inference' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Determine image tag
        shell: bash
        env:
          DOCKER_ORG: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [[ "$GITHUB_REF" =~ ^"refs/tags/" ]]; then
            IMAGE_TAG="${GITHUB_REF#refs/tags/}"
            echo "Will handle tag $IMAGE_TAG"
          else
            # Branch names may contain characters invalid in image tags.
            IMAGE_TAG="nightly-$(printf %s "$GITHUB_REF_NAME" | tr -c 'a-zA-Z0-9_.-' '-')"
          fi
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          # Build-only runs (forks, workflow_dispatch) have no Docker Hub
          # secrets; any org name yields a valid local tag.
          echo "DOCKER_ORG=${DOCKER_ORG:-xprobe}" >> $GITHUB_ENV

      - name: Build (and push on release tags) ${{ matrix.arch }} image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: xinference/deploy/docker/pypiserver/Dockerfile.pypiserver
          platforms: linux/${{ matrix.arch }}
          build-args: |
            PLATFORM=${{ matrix.arch }}
          push: ${{ startsWith(github.ref, 'refs/tags/') && github.repository == 'xorbitsai/inference' }}
          provenance: false
          tags: |
            ${{ env.DOCKER_ORG }}/xinference-pypiserver:${{ env.IMAGE_TAG }}-${{ matrix.arch }}

  # ------------------------------------------------------------------
  # Merge architecture-specific images into multi-arch manifest lists.
  # Users pull :<tag> or :latest and get the correct arch automatically.
  # ------------------------------------------------------------------
  merge-manifest:
    name: Merge multi-arch manifest
    needs: build-and-push-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: ${{ startsWith(github.ref, 'refs/tags/') && github.repository == 'xorbitsai/inference' }}

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Create and push multi-arch manifests
        env:
          DOCKER_ORG: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          IMAGE_TAG="${GITHUB_REF#refs/tags/}"
          docker buildx imagetools create \
            --tag "$DOCKER_ORG/xinference-pypiserver:$IMAGE_TAG" \
            "$DOCKER_ORG/xinference-pypiserver:$IMAGE_TAG-amd64" \
            "$DOCKER_ORG/xinference-pypiserver:$IMAGE_TAG-arm64"
          docker buildx imagetools create \
            --tag "$DOCKER_ORG/xinference-pypiserver:latest" \
            "$DOCKER_ORG/xinference-pypiserver:$IMAGE_TAG-amd64" \
            "$DOCKER_ORG/xinference-pypiserver:$IMAGE_TAG-arm64"
