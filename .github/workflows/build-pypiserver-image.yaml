name: Build custom pypiserver image

on:
  workflow_dispatch:
  push:
    branches:
      - feat/build-pypiserver-image

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-pypiserver-image:
    name: Build and publish custom pypiserver image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: qinruicool/pypiserver

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build "setuptools<82"

      - name: Build web assets
        run: python setup.py build_web

      - name: Build Python package artifacts
        run: |
          python -m build --sdist --wheel --outdir dist .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push custom pypiserver image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: xinference/deploy/docker/Dockerfile.pypi
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
