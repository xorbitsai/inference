name: Build custom pypiserver image

on:
  workflow_dispatch:
  push:
    branches:
      - feat/build-pypiserver-image

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # Build Docker image per architecture on native runners.
  # Each runner uses list-packages.sh to generate the package list,
  # then pip download collects all wheels inside the container.
  # ------------------------------------------------------------------
  build-and-push-image:
    name: Build and push ${{ matrix.arch }} image
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: qinruicool/pypiserver-devvv

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push ${{ matrix.arch }} image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: xinference/deploy/docker/Dockerfile.pypiserver
          platforms: linux/${{ matrix.arch }}
          build-args: |
            PLATFORM=${{ matrix.arch }}
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}-${{ matrix.arch }}
            ${{ env.IMAGE_NAME }}:latest-${{ matrix.arch }}

  # ------------------------------------------------------------------
  # Merge architecture-specific images into a multi-arch manifest list.
  # Users pull :latest or :<sha> and get the correct arch automatically.
  # ------------------------------------------------------------------
  merge-manifest:
    name: Merge multi-arch manifest
    needs: build-and-push-image
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      IMAGE_NAME: qinruicool/pypiserver-dev

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Create and push multi-arch manifest (:latest)
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME }}:latest \
            ${{ env.IMAGE_NAME }}:latest-amd64 \
            ${{ env.IMAGE_NAME }}:latest-arm64

      - name: Create and push multi-arch manifest (:sha)
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}-amd64 \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}-arm64
