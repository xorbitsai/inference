name: GPU Runner Check

on:
  workflow_dispatch:
  push:
    branches:
      - bld/adopt-gpu-larger-runner

jobs:
  inspect:
    runs-on: gpu-t4
    steps:
      - name: System info
        run: |
          echo "=== Arch / OS ==="
          uname -a

          echo "=== CPU ==="
          nproc
          lscpu

          echo "=== Memory ==="
          free -h

          echo "=== Disk ==="
          df -h
          
          echo "-------Check software version-------"
          python --version || echo "python not found"
          pip --version || echo "pip not found"
          conda --version || echo "conda not found"
          which python3
          python3 --version || echo "python3 not found"
          which python3.12
          which conda

          echo "=== GPU / CUDA ==="
          nvidia-smi
          nvcc --version || echo "nvcc not found"
