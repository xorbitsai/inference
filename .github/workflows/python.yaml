name: Python CI

on:
  push:
    branches:
      - '*'
  pull_request:
    types: ['opened', 'reopened', 'synchronize']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ "ubuntu-latest" ]
        python-version: [ "3.10" ]
    steps:
      - name: Check out code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Set up Python environment
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run pre-commit
        run: pre-commit run --all-files
      - name: Set up Node.js
        uses: actions/setup-node@v1
        with:
          node-version: 16
      # ESLint and Prettier must be in `package.json`
      - name: Install Node.js dependencies
        run: cd xinference/ui/web/ui && npm ci
      - name: ESLint Check
        run: cd xinference/ui/web/ui && npx eslint .
      - name: Prettier Check
        run: cd xinference/ui/web/ui && ./node_modules/.bin/prettier --check .

  build_test_job:
    runs-on: ${{ matrix.os }}
    needs: lint
    env:
      CONDA_ENV: test
    defaults:
      run:
        shell: bash -l {0}
    strategy:
      fail-fast: false
      matrix:
        os: [ "ubuntu-latest", "macos-latest", "windows-latest" ]
        python-version: [ "3.10", "3.11", "3.12", "3.13" ]
        module: [ "xinference" ]
        exclude:
          - { os: macos-latest, python-version: 3.11 }
          - { os: macos-latest, python-version: 3.12 }
          - { os: windows-latest, python-version: 3.11 }
          - { os: windows-latest, python-version: 3.12 }
        include:
          - { os: macos-latest, module: metal, python-version: "3.10" }

    steps:
      - name: Check out code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up conda ${{ matrix.python-version }}
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: ${{ matrix.python-version }}
          activate-environment: ${{ env.CONDA_ENV }}

      # Important for python == 3.12 and 3.13
      - name: Update pip and setuptools
        if: ${{ matrix.python-version == '3.12' || matrix.python-version == '3.13' }}
        run: |
          python -m pip install -U pip "setuptools<82"

      # Install torch for Python 3.13 using nightly builds
      - name: Install torch for Python 3.13
        if: ${{ matrix.python-version == '3.13'}}
        run: |
          python -m pip install torch torchvision torchaudio

      - name: Install numpy
        if: |
          (startsWith(matrix.os, 'macos') && (matrix.python-version == '3.13')) || 
          (startsWith(matrix.os, 'windows'))
        run: |
          python -m pip install "numpy<2"

      - name: Install dependencies
        env:
          MODULE: ${{ matrix.module }}
          OS: ${{ matrix.os }}
        run: |
          if [ "$OS" == "ubuntu-latest" ]; then
            sudo rm -rf /usr/share/dotnet
            sudo rm -rf /opt/ghc
            sudo rm -rf "/usr/local/share/boost"
            sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          fi
          pip install -e ".[dev]"
          pip install "xllamacpp>=0.2.0"
          if [ "$MODULE" == "metal" ]; then
            conda install -c conda-forge "ffmpeg<7"
            pip install "mlx>=0.22.0"
            pip install mlx-lm
            pip install "mlx-vlm>=0.3.4"
            pip install mlx-whisper
            pip install f5-tts-mlx
            pip install qwen-vl-utils!=0.0.9
            pip install tomli 
          else
            pip install "transformers<4.49"
            pip install attrdict
            pip install "timm>=0.9.16"
            if [ "${{ matrix.python-version }}" != "3.13" ]; then
              pip install torch torchvision
            fi
            pip install accelerate
            pip install sentencepiece
            pip install transformers_stream_generator
            pip install bitsandbytes
            pip install "sentence-transformers>=5.1.1"
            pip install modelscope
            pip install diffusers
            pip install protobuf
            pip install "FlagEmbedding==1.3.5"
            pip install "tenacity>=8.2.0,<8.4.0"
            pip install "jinja2==3.1.2"
            pip install jj-pytorchvideo
            pip install qwen-vl-utils!=0.0.9
            pip install datamodel_code_generator
            pip install jsonschema
          fi
        working-directory: .

      - name: Clean up disk
        if: |
          (startsWith(matrix.os, 'ubuntu'))
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          df -h 
          
      - name: Fix SSL on Windows
        if: startsWith(matrix.os, 'windows')
        shell: bash
        run: |
          echo "activate conda env"

          source $CONDA/etc/profile.d/conda.sh || true
          conda activate $CONDA_ENV || true
          
          python -V
          which python
          
          echo "before: $SSL_CERT_FILE"
          
          python -m pip install --quiet certifi || true
          
          SSL_CERT_FILE=$(python -c "import certifi,os;print(os.path.normpath(certifi.where()))")
          
          export SSL_CERT_FILE
          export REQUESTS_CA_BUNDLE=$SSL_CERT_FILE
          export CURL_CA_BUNDLE=$SSL_CERT_FILE
          
          echo "after: $SSL_CERT_FILE"
          echo "SSL_CERT_FILE=$(python -c 'import certifi;print(certifi.where())')" >> $GITHUB_ENV
    
      - name: Test with pytest
        env:
          MODULE: ${{ matrix.module }}
          PYTORCH_MPS_HIGH_WATERMARK_RATIO: 1.0
          PYTORCH_MPS_LOW_WATERMARK_RATIO: 0.2
          XFORMERS_FORCE_DISABLE_TRITON: 1
          TORCH_DISABLE_FLASH_ATTENTION: 1
        run: |
          if [ "$MODULE" == "metal" ]; then
            pytest --timeout=3000 \
              -W ignore::PendingDeprecationWarning \
              --cov-config=setup.cfg --cov-report=xml --cov=xinference xinference/model/llm/mlx/tests/test_mlx.py && \
            pytest --timeout=3000 \
              -W ignore::PendingDeprecationWarning \
              --cov-config=setup.cfg --cov-report=xml --cov=xinference xinference/model/audio/tests/test_whisper_mlx.py && \
            pytest --timeout=3000 \
              -W ignore::PendingDeprecationWarning \
              --cov-config=setup.cfg --cov-report=xml --cov=xinference xinference/model/audio/tests/test_f5tts_mlx.py && \
            pytest --timeout=3000 \
              -W ignore::PendingDeprecationWarning \
              --cov-config=setup.cfg --cov-report=xml --cov=xinference xinference/model/llm/mlx/tests/test_distributed_model.py
          else
            pytest --timeout=3000 \
              -W ignore::PendingDeprecationWarning \
              -vv \
              --cov-config=setup.cfg \
              --cov-report=xml \
              --cov=xinference \
              --ignore xinference/core/tests/test_continuous_batching.py \
              --ignore xinference/model/image/tests/test_stable_diffusion.py \
              --ignore xinference/model/image/tests/test_got_ocr2.py \
              --ignore xinference/model/audio/tests \
              --ignore xinference/model/embedding/tests/test_integrated_embedding.py \
              --ignore xinference/model/llm/transformers/tests/test_tensorizer.py \
              --ignore xinference/model/llm/tests/test_llm_model.py \
              --ignore xinference/model/llm/vllm \
              --ignore xinference/model/llm/sglang \
              --ignore xinference/client/tests/test_client.py \
              --ignore xinference/client/tests/test_async_client.py \
              --ignore xinference/model/llm/mlx \
              xinference

          fi
        working-directory: .

  gpu_test_job:
    # GPU runners are billed per-minute, so only run for PRs and pushes to main
    # (a push to a PR branch already triggers the pull_request run).
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: gpu-t4
    needs: lint
    timeout-minutes: 90
    env:
      CONDA_ENV: test
      # GPU tests never touch the web UI; skipping the npm build saves minutes.
      # The API server only warns when the UI bundle is absent.
      NO_WEB_UI: 1
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Check out code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          # Python 3.11, not 3.12: pynini==2.1.5 (pinned by WeTextProcessing
          # and nemo_text_processing) and onnxruntime-gpu==1.16.0 only publish
          # wheels up to cp311.
          python-version: "3.11"
          activate-environment: ${{ env.CONDA_ENV }}

      - name: Restore uv package cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: gpu-uv-${{ hashFiles('.github/workflows/python.yaml', 'setup.cfg') }}
          restore-keys: gpu-uv-

      - name: Install system dependencies
        run: |
          # ffmpeg is required by whisper/funasr audio loading; espeak-ng is
          # used for phonemization by TTS models. The old self-hosted machine
          # had both preinstalled; hosted runner images do not.
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg espeak-ng

      - name: Install dependencies
        run: |
          python -m pip install -U pip "setuptools<82" uv
          # NOTE: no `uv pip install -U` here — unlike pip, uv's --upgrade
          # upgrades the whole dependency closure to the latest versions, which
          # pushes shared deps (numpy, pandas, starlette, ...) past what the
          # audio stack supports. Runners are ephemeral, so everything below is
          # freshly resolved to the latest allowed versions anyway.
          # Pin torch first so the packages below resolve against it instead of
          # first downloading the latest torch and downgrading afterwards.
          uv pip install "torch==2.7.0" "torchaudio==2.7.0" "torchvision==0.22.0"
          uv pip install -e ".[audio,dev]"
          uv pip install "openai>1" modelscope gguf sse_starlette xoscar \
            "python-jose[cryptography]" "passlib[bcrypt]" "aioprometheus[starlette]" pynvml
          # numpy/numba guards: numba releases cap numpy (<2.5); without them
          # the resolver backtracks to ancient numba/llvmlite that cannot even
          # build on this Python.
          uv pip install "transformers==4.53.2" "funasr==1.2.7" \
            "nemo_text_processing<1.1.0" "omegaconf~=2.3.0" "WeTextProcessing<1.0.4" \
            "numpy<2.5" "numba>=0.60"
          uv pip install librosa xxhash HyperPyYAML openai-whisper
          uv pip install "ChatTTS==0.2.4" "onnxruntime-gpu==1.16.0"
          uv pip install loguru natsort loralib ormsgpack
          # diffusers<0.38: the krea2 (0.39) and nucleusmoe_image (0.38)
          # pipelines unconditionally import Qwen3VL* classes that do not
          # exist in the pinned transformers==4.53.2; 0.37 imports cleanly.
          uv pip install accelerate verovio cachetools silero-vad pydantic "diffusers<0.38" \
            onnx onnxconverter_common torchdiffeq "x_transformers>=1.31.14" pypinyin \
            tomli vocos jieba soundfile sentence-transformers FlagEmbedding
          uv pip install tensorizer "peft<=0.17.1"
          uv pip install "xllamacpp>=0.2.0" --index-url https://xorbitsai.github.io/xllamacpp/whl/cu124 --extra-index-url https://pypi.org/simple
          uv pip install hf_transfer
          uv pip uninstall matcha-tts opencc faster_whisper
        working-directory: .

      - name: Run GPU tests
        env:
          XFORMERS_FORCE_DISABLE_TRITON: 1
          TORCH_DISABLE_FLASH_ATTENTION: 1
          # Speed up model downloads from the HuggingFace hub; runners are
          # ephemeral so every run downloads the models from scratch.
          HF_HUB_ENABLE_HF_TRANSFER: 1
        run: |
          tests=(
            xinference/core/tests/test_continuous_batching.py
            xinference/model/embedding/tests/test_qwen3_vl_engine_params.py
            xinference/model/rerank/tests/test_qwen3_vl_reranker_virtualenv.py
            xinference/model/image/tests/test_stable_diffusion.py
            xinference/model/image/tests/test_got_ocr2.py
            xinference/model/audio/tests/test_whisper.py
            xinference/model/audio/tests/test_funasr.py
            xinference/model/audio/tests/test_chattts.py
            xinference/model/audio/tests/test_cosyvoice.py
            xinference/model/audio/tests/test_f5tts.py
            xinference/model/audio/tests/test_melotts.py
            xinference/model/audio/tests/test_kokoro.py
            xinference/model/audio/tests/test_fish_speech.py
            xinference/model/audio/tests/test_megatts.py
            xinference/model/embedding/tests/test_integrated_embedding.py
            xinference/model/embedding/vllm/tests/test_vllm_embedding.py
            xinference/model/llm/transformers/tests/test_tensorizer.py
            xinference/model/llm/tests/test_llm_model.py
          )
          # Each file runs in its own process so GPU memory is fully released
          # between test files, matching the previous serial behavior.
          for t in "${tests[@]}"; do
            pytest --timeout=3000 -W ignore::PendingDeprecationWarning "$t" || exit 1
          done
        working-directory: .