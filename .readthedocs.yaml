version: 2

# Build documentation in the docs/ directory with Sphinx
sphinx:
   configuration: doc/source/conf.py

build:
  os: ubuntu-24.04
  tools:
    python: "3.10"
  apt_packages:
    - gettext
  jobs:
    # Compile .mo before Sphinx so conf.py does not repeat the work silently.
    pre_build:
      - cd doc && python build_i18n.py

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - doc
