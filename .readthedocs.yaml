version: 2

# Build documentation in the docs/ directory with Sphinx
sphinx:
   configuration: doc/source/conf.py

build:
  os: ubuntu-24.04
  tools:
    python: "3.10"
  jobs:
    # Run after .[doc] is installed so babel/sphinx-intl are available.
    post_install:
      - cd doc && python build_i18n.py

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - doc
