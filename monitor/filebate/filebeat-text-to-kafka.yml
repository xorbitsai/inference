# Filebeat -> Kafka 示例配置（Text 格式）
# 用途: 采集 xinference supervisor/worker 应用日志 + 审计日志（text格式），输出到 Kafka 供下游消费
# 使用: filebeat -e -c filebeat-text-to-kafka.yml
#
# 日志格式: Text（每行一条，使用 dissect 解析字段）
# 格式: {timestamp} {level} {module} pid:{pid} role:{role} address:{address} node:{node} {message}
# 环境变量: XINFERENCE_LOG_FORMAT=text

filebeat.inputs:
  # --- 应用日志（supervisor）---
  - type: log
    id: xinference-supervisor
    enabled: true
    paths:
      - /data/xinference_home/logs/xinference.log
      - /data/xinference_home/logs/xinference-*.log
    fields:
      log_type: supervisor
      cluster: xinference
    fields_under_root: true

  # --- 应用日志（worker）---
  - type: log
    id: xinference-worker
    enabled: true
    paths:
      - /data/xinference_home_worker/logs/xinference.log
      - /data/xinference_home_worker/logs/xinference-*.log
    fields:
      log_type: worker
      cluster: xinference
    fields_under_root: true

  # --- 审计日志（仅 supervisor，始终为 JSON 格式）---
  - type: log
    id: xinference-audit
    enabled: true
    paths:
      - /data/xinference_home/logs/audit.log
    json.keys_under_root: true
    json.overwrite_keys: true
    json.add_error_key: true
    fields:
      log_type: audit
      cluster: xinference
    fields_under_root: true

processors:
  # 解析 text 格式的应用日志（审计日志已通过 json.keys_under_root 解析）
  - if:
      not:
        equals:
          log_type: "audit"
    then:
      - dissect:
          tokenizer: "%{@timestamp} %{level} %{module} pid:%{pid} role:%{role} address:%{address} node:%{node} %{msg}"
          field: "message"
          target_prefix: ""
          overwrite_keys: true
      - rename:
          fields:
            - from: "msg"
              to: "message"
          ignore_missing: true

  - drop_fields:
      fields:
        - agent
        - ecs
        - host
        - input
        - log
        - event
        - data_stream
        - elastic_agent
        - cloud
        - container
        - kubernetes
        - orchestrator
        - "@version"
      ignore_missing: true

  - timestamp:
      field: "@timestamp"
      layouts:
        - '2006-01-02T15:04:05.000Z'
      timezone: "UTC"
      ignore_failure: true

output.kafka:
  hosts: ["kafka1:9092", "kafka2:9092", "kafka3:9092"]
  topic: "xinference-logs-%{[log_type]}"
  partition.round_robin:
    reachable_only: true
  codec.json:
    pretty: false
  required_acks: 1
  compression: gzip
  max_message_bytes: 1048576
  # username: "filebeat"
  # password: "changeme"
  # sasl.mechanism: "PLAIN"

logging.metrics.enabled: true
logging.metrics.period: 60s
logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
