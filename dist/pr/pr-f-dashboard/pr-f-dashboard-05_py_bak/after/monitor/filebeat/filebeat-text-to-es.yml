# Filebeat -> Elasticsearch example configuration (Text format)
# Purpose: Collect xinference supervisor/worker application logs (text format) + audit logs (JSON), write directly to ES
# Usage: filebeat -e -c filebeat-text-to-es.yml
#
# Application log format: Text (one line per entry, parsed with dissect)
# Format: {timestamp} {level} {module} pid:{pid} role:{role} address:{address} node:{node} {message}
# Audit log format: JSON (always JSON, not affected by XINFERENCE_LOG_FORMAT)
# Environment variable: XINFERENCE_LOG_FORMAT=text

filebeat.inputs:
  # --- Application logs (supervisor) ---
  - type: log
    id: xinference-supervisor
    enabled: true
    paths:
      - /data/xinference_home/logs/xinference.log
      - /data/xinference_home/logs/xinference-*.log
    fields:
      log_type: supervisor
      cluster: xinference
    fields_under_root: true

  # --- Application logs (worker) ---
  - type: log
    id: xinference-worker
    enabled: true
    paths:
      - /data/xinference_home_worker/logs/xinference.log
      - /data/xinference_home_worker/logs/xinference-*.log
    fields:
      log_type: worker
      cluster: xinference
    fields_under_root: true

  # --- Audit logs (supervisor only, always JSON format) ---
  - type: log
    id: xinference-audit
    enabled: true
    paths:
      - /data/xinference_home/logs/audit.log
    json.keys_under_root: true
    json.overwrite_keys: true
    json.add_error_key: true
    fields:
      log_type: audit
      cluster: xinference
    fields_under_root: true

processors:
  # Parse text-format application logs (audit logs are already parsed via json.keys_under_root)
  - if:
      not:
        equals:
          log_type: "audit"
    then:
      - dissect:
          tokenizer: "%{@timestamp} %{level} %{module} pid:%{pid} role:%{role} address:%{address} node:%{node} %{msg}"
          field: "message"
          target_prefix: ""
          overwrite_keys: true
      - rename:
          fields:
            - from: "msg"
              to: "message"
          ignore_missing: true

  - drop_fields:
      fields:
        - agent
        - ecs
        - host
        - input
        - log
        - event
        - data_stream
        - elastic_agent
        - cloud
        - container
        - kubernetes
        - orchestrator
        - "@version"
      ignore_missing: true

  - timestamp:
      field: "@timestamp"
      layouts:
        - '2006-01-02T15:04:05.000Z'
      timezone: "UTC"
      ignore_failure: true

output.elasticsearch:
  hosts: ["http://elasticsearch:9200"]
  indices:
    - index: "xinference-audit-%{+yyyy.MM.dd}"
      when.equals:
        log_type: "audit"
    - index: "xinference-logs-%{[log_type]}-%{+yyyy.MM.dd}"
      when.has_fields: ["log_type"]
  # username: "elastic"
  # password: "changeme"

setup.template.name: "xinference"
setup.template.pattern: "xinference-*"
setup.template.settings:
  index.number_of_shards: 2
  index.number_of_replicas: 1

setup.ilm.enabled: false
setup.ilm.rollover_alias: "xinference-logs"
setup.ilm.policy_name: "xinference-logs-policy"

logging.metrics.enabled: true
logging.metrics.period: 60s
logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
  permissions: 0644
